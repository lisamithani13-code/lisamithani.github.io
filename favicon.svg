<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <!-- Purple → Cyan gradient, top-left to bottom-right -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark rounded square -->
  <rect width="32" height="32" rx="7" fill="#0B0F19"/>

  <!-- Subtle inner border (glassmorphism) -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Geometric L mark — centred in 32×32 canvas -->
  <!-- Shape: 14 wide × 20 tall, so 9px margin left/right, 6px top/bottom -->
  <path
    d="M9,6 L14,6 L14,21 L23,21 L23,26 L9,26 Z"
    fill="url(#g)"
    filter="url(#glow)"
  />
</svg>
